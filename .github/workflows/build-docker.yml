name: Build DouyinLiveRecorder Docker Image

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules use UTC. This is Monday 03:23 in Asia/Shanghai.
    - cron: "23 19 * * 0"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: chihotam
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout image builder
        uses: actions/checkout@v4

      - name: Set image date tag
        run: echo "IMAGE_DATE=$(date -u +'%Y%m%d')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            chihotam/live-recorder:latest
            chihotam/live-recorder:${{ env.IMAGE_DATE }}
